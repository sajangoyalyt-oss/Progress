<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>System Dashboard</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for running JSX in-browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Premium Curved Sans Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            display: ['"Outfit"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .display-font {
      font-family: 'Outfit', sans-serif;
    }
    /* Elegant 3D Glass & Shadow Depth */
    .premium-card {
      background: #ffffff;
      border: 1px solid rgba(241, 245, 249, 0.9);
      box-shadow: 0 10px 30px -5px rgba(51, 65, 85, 0.03), 
                  0 1px 3px -1px rgba(51, 65, 85, 0.02);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .premium-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -5px rgba(51, 65, 85, 0.06), 
                  0 1px 3px -1px rgba(51, 65, 85, 0.02);
    }
    /* Simple custom switch styling */
    .switch-checkbox:checked + .switch-label {
      background-color: #10b981;
    }
    .switch-checkbox:checked + .switch-label .switch-dot {
      transform: translateX(100%);
    }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-700 min-h-screen selection:bg-emerald-500/10">

  <div id="root"></div>

  <!-- Main App Script utilizing Import Map safe syntax -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Elegant Minimal SVGs
    const Icons = {
      Calendar: () => (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      ),
      History: () => (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      ),
      Review: () => (
        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 3.055A9.003 9.003 0 1020.945 13H11V3.055z" />
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
        </svg>
      ),
      Check: () => (
        <svg className="w-3.5 h-3.5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3.5} d="M5 13l4 4L19 7" />
        </svg>
      ),
      Trash: () => (
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Plus: () => (
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4" />
        </svg>
      ),
      Stars: () => (
        <svg className="w-4 h-4 text-amber-500" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
        </svg>
      )
    };

    // 7 Core Metric Rules
    const defaultChecklistRules = [
      { id: "noPhoneMorning", label: "No Phone First 30 Mins After Waking" },
      { id: "workBeforeEnt", label: "90 Mins Deep Work Before Entertainment" },
      { id: "boredomTraining", label: "10 Mins Silence / Boredom Practice" },
      { id: "exercise", label: "Daily Physical Activity (Gym / Walk)" },
      { id: "noPornBefore8", label: "★ Target Control (Time Boundaries)" },
      { id: "noPhoneToilet", label: "No Phone in Restrooms" },
      { id: "noPhoneMeals", label: "No Phone During Meals" }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard', 'history', 'review'
      const [toastMsg, setToastMsg] = useState(null);

      // Local State loaded safely from browser memory
      const [logs, setLogs] = useState(() => {
        const saved = localStorage.getItem('recovery_daily_logs');
        return saved ? JSON.parse(saved) : {};
      });

      const [tasks, setTasks] = useState(() => {
        const saved = localStorage.getItem('recovery_tasks_pool');
        return saved ? JSON.parse(saved) : [];
      });

      // Get local date code (YYYY-MM-DD)
      const getTodayString = () => {
        const today = new Date();
        const offset = today.getTimezoneOffset();
        const localDate = new Date(today.getTime() - (offset * 60 * 1000));
        return localDate.toISOString().split('T')[0];
      };

      // Form inputs
      const [formDate, setFormDate] = useState(getTodayString());
      const [checkedHabits, setCheckedHabits] = useState({
        noPhoneMorning: false,
        workBeforeEnt: false,
        boredomTraining: false,
        exercise: false,
        noPornBefore8: false,
        noPhoneToilet: false,
        noPhoneMeals: false
      });
      const [screenTime, setScreenTime] = useState(8.0);
      const [starCount, setStarCount] = useState(0);
      const [focusedWorkHours, setFocusedWorkHours] = useState(4.5);
      const [weight, setWeight] = useState(110.0);
      const [notes, setNotes] = useState('');

      // Task text input
      const [newTaskText, setNewTaskText] = useState('');

      // Sunday Review target date selector
      const [selectedReviewDate, setSelectedReviewDate] = useState(getTodayString());

      // Show temporary clean feedback toast
      const triggerToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(null), 2500);
      };

      // Update storage
      useEffect(() => {
        localStorage.setItem('recovery_daily_logs', JSON.stringify(logs));
      }, [logs]);

      useEffect(() => {
        localStorage.setItem('recovery_tasks_pool', JSON.stringify(tasks));
      }, [tasks]);

      // AUTO-LOAD OR EDIT DATA INSTANTLY UPON CHANGING DATE (Solves "option to edit things")
      useEffect(() => {
        const savedDay = logs[formDate];
        if (savedDay) {
          setCheckedHabits(savedDay.checkedHabits || {
            noPhoneMorning: false,
            workBeforeEnt: false,
            boredomTraining: false,
            exercise: false,
            noPornBefore8: false,
            noPhoneToilet: false,
            noPhoneMeals: false
          });
          setScreenTime(savedDay.screenTime || 0);
          setStarCount(savedDay.starCount || 0);
          setFocusedWorkHours(savedDay.focusedWorkHours || 0);
          setWeight(savedDay.weight || 110.0);
          setNotes(savedDay.notes || '');
        } else {
          // Fall back to clean default metrics
          setCheckedHabits({
            noPhoneMorning: false,
            workBeforeEnt: false,
            boredomTraining: false,
            exercise: false,
            noPornBefore8: false,
            noPhoneToilet: false,
            noPhoneMeals: false
          });
          setScreenTime(8.0);
          setStarCount(0);
          setFocusedWorkHours(4.5);
          
          // Auto prefill most recently logged weight
          const sortedDays = Object.keys(logs).sort();
          if (sortedDays.length > 0) {
            setWeight(logs[sortedDays[sortedDays.length - 1]].weight || 110.0);
          } else {
            setWeight(110.0);
          }
          setNotes('');
        }
      }, [formDate, logs]);

      const hasSavedDataForActiveDate = useMemo(() => {
        return !!logs[formDate];
      }, [formDate, logs]);

      // Direct Save handler (Fixes "save button dont work" without form-submission reload issues)
      const saveRecord = () => {
        const score = Object.values(checkedHabits).filter(Boolean).length;

        const updatedLogs = {
          ...logs,
          [formDate]: {
            checkedHabits,
            score,
            screenTime: parseFloat(screenTime) || 0,
            starCount: parseInt(starCount) || 0,
            focusedWorkHours: parseFloat(focusedWorkHours) || 0,
            weight: parseFloat(weight) || 110.0,
            notes: notes.trim()
          }
        };

        setLogs(updatedLogs);
        triggerToast(hasSavedDataForActiveDate ? "Record updated successfully" : "Record saved successfully");
      };

      // Create Task function (Fully fixed - button submit issues bypassed)
      const createNewTask = () => {
        if (!newTaskText.trim()) return;

        const newTask = {
          id: 'task_' + Date.now(),
          text: newTaskText.trim(),
          completed: false,
          createdAt: formDate,
          completedAt: null
        };

        setTasks([...tasks, newTask]);
        setNewTaskText('');
        triggerToast("Task added to active pool");
      };

      // Toggle Task (Logs completion date strictly associated with formDate)
      const toggleTaskStatus = (taskId) => {
        const updated = tasks.map((task) => {
          if (task.id === taskId) {
            const isCompletedNow = !task.completed;
            return {
              ...task,
              completed: isCompletedNow,
              completedAt: isCompletedNow ? formDate : null
            };
          }
          return task;
        });
        setTasks(updated);
      };

      // Delete Task from memory
      const deleteTaskFromPool = (taskId) => {
        setTasks(tasks.filter(t => t.id !== taskId));
      };

      // Carry-Over logic filter (Incomplete stay indefinitely, completed stays ONLY on the day they were finished)
      const filteredTasksForDay = useMemo(() => {
        return tasks.filter((task) => {
          if (!task.completed) return true;
          return task.completedAt === formDate;
        }).sort((a, b) => b.id.localeCompare(a.id));
      }, [tasks, formDate]);

      // Dynamic logs sort
      const sortedHistoryLogs = useMemo(() => {
        return Object.keys(logs)
          .map(dateKey => ({ date: dateKey, ...logs[dateKey] }))
          .sort((a, b) => b.date.localeCompare(a.date));
      }, [logs]);

      // 📊 AUTOMATIC SUNDAY / WEEKLY REVIEW CALCULATION (Zero Manual Inputs Required)
      const automaticWeeklyStats = useMemo(() => {
        const endRangeDate = new Date(selectedReviewDate);
        const dateList = [];
        
        // Collate previous 7 dates
        for (let i = 0; i < 7; i++) {
          const tempDate = new Date(endRangeDate);
          tempDate.setDate(endRangeDate.getDate() - i);
          const dateStr = tempDate.toISOString().split('T')[0];
          dateList.push(dateStr);
        }

        const loggedDaysInWeek = dateList.map(dateStr => {
          const log = logs[dateStr];
          return log ? { date: dateStr, ...log } : null;
        }).filter(Boolean);

        if (loggedDaysInWeek.length === 0) {
          return {
            daysLogged: 0,
            avgScreen: "0.0",
            totalStar: 0,
            totalWork: "0.0",
            avgWork: "0.0",
            weight: "—",
            avgScore: 0
          };
        }

        const sumScreen = loggedDaysInWeek.reduce((sum, d) => sum + d.screenTime, 0);
        const sumStar = loggedDaysInWeek.reduce((sum, d) => sum + d.starCount, 0);
        const sumWork = loggedDaysInWeek.reduce((sum, d) => sum + d.focusedWorkHours, 0);
        const sumScore = loggedDaysInWeek.reduce((sum, d) => sum + d.score, 0);

        // Fetch weight trend
        const sortedLogsByDate = [...loggedDaysInWeek].sort((a, b) => b.date.localeCompare(a.date));
        const latestWeight = sortedLogsByDate[0] ? sortedLogsByDate[0].weight : "—";

        return {
          daysLogged: loggedDaysInWeek.length,
          avgScreen: (sumScreen / loggedDaysInWeek.length).toFixed(1),
          totalStar: sumStar,
          totalWork: sumWork.toFixed(1),
          avgWork: (sumWork / loggedDaysInWeek.length).toFixed(1),
          weight: latestWeight,
          avgScore: ((sumScore / (loggedDaysInWeek.length * 7)) * 100).toFixed(0)
        };
      }, [selectedReviewDate, logs]);

      // Current active streak calculation
      const activeStreak = useMemo(() => {
        const ascDates = Object.keys(logs).sort();
        if (ascDates.length === 0) return 0;
        
        let currentStreak = 0;
        const todayStr = getTodayString();
        const hasLogToday = ascDates.includes(todayStr);

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().split('T')[0];
        const hasLogYesterday = ascDates.includes(yesterdayStr);

        if (hasLogToday || hasLogYesterday) {
          let testDate = hasLogToday ? new Date() : yesterday;
          let active = true;
          while (active) {
            const testStr = testDate.toISOString().split('T')[0];
            if (ascDates.includes(testStr)) {
              currentStreak++;
              testDate.setDate(testDate.getDate() - 1);
            } else {
              active = false;
            }
          }
        }
        return currentStreak;
      }, [logs]);

      // Settings flush handler
      const wipeBrowserLogs = () => {
        if (window.confirm("This will permanently delete all records inside this browser. Continue?")) {
          setLogs({});
          setTasks([]);
          triggerToast("All data cleared successfully");
        }
      };

      return (
        <div className="min-h-screen bg-[#f8fafc] text-slate-600 flex flex-col justify-between pb-24">
          
          {/* Header */}
          <header className="border-b border-slate-100 bg-white/85 sticky top-0 z-40 backdrop-blur-md px-4 py-4">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="w-8.5 h-8.5 rounded-xl bg-gradient-to-tr from-slate-800 to-slate-900 flex items-center justify-center shadow-md">
                  <span className="font-bold text-white text-xs display-font">P</span>
                </div>
                <div>
                  <h1 className="font-bold text-sm tracking-wide text-slate-800 display-font uppercase">SYSTEM COMMAND</h1>
                  <p className="text-[9px] text-slate-400 font-mono tracking-wider uppercase">Local Environment Mode</p>
                </div>
              </div>

              <div>
                <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-emerald-50 border border-emerald-100 text-[9px] font-mono tracking-wider text-emerald-600 uppercase font-semibold">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                  Active Node
                </span>
              </div>
            </div>
          </header>

          {/* Toast Alert banner */}
          {toastMsg && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-slate-900 text-white text-xs font-mono rounded-full shadow-lg flex items-center gap-2">
              <span>✓</span> {toastMsg}
            </div>
          )}

          {/* Main Space Container */}
          <main className="max-w-4xl w-full mx-auto px-4 py-6 flex-grow space-y-6">

            {/* TAB 1: EXECUTIVE DASHBOARD */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                
                {/* 2-COLUMN PREMIUM WORKSPACE */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                  
                  {/* Left Side: Daily Logger Input Unit */}
                  <div className="lg:col-span-7 space-y-5">
                    <section className="premium-card rounded-[2.5rem] p-6 relative overflow-hidden">
                      
                      <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <div>
                          <h2 className="font-bold text-sm tracking-wide text-slate-850 display-font">METRIC LOGGING</h2>
                          <p className="text-[10px] text-slate-400 font-mono uppercase tracking-wider mt-0.5">Parameters load automatically on date shift</p>
                        </div>
                        <span className="text-slate-400"><Icons.Calendar /></span>
                      </div>

                      <div className="space-y-5">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[10px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">Target Date</label>
                            <input 
                              type="date"
                              value={formDate}
                              onChange={(e) => setFormDate(e.target.value)}
                              className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 font-mono shadow-inner"
                              required
                            />
                          </div>
                          <div>
                            <label className="block text-[10px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">Weight Record (kg)</label>
                            <input 
                              type="number" step="0.1"
                              value={weight}
                              onChange={(e) => setWeight(parseFloat(e.target.value) || 0)}
                              className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 font-mono shadow-inner"
                              required
                            />
                          </div>
                        </div>

                        {/* Checklist */}
                        <div>
                          <label className="block text-[10px] font-mono text-slate-400 uppercase tracking-wider mb-3.5 font-semibold">Checks Matrix</label>
                          <div className="space-y-2">
                            {defaultChecklistRules.map((item) => {
                              const checked = checkedHabits[item.id];
                              return (
                                <button
                                  type="button"
                                  key={item.id}
                                  onClick={() => setCheckedHabits({ ...checkedHabits, [item.id]: !checked })}
                                  className={`w-full flex items-center gap-3.5 p-3.5 text-left rounded-2xl border transition-all duration-200 ${
                                    checked 
                                      ? 'bg-emerald-50/50 border-emerald-200 text-slate-800 font-medium' 
                                      : 'bg-white border-slate-200/80 text-slate-500 hover:border-slate-300'
                                  }`}
                                >
                                  <span className={`w-5 h-5 rounded-lg flex items-center justify-center border transition-all ${
                                    checked ? 'bg-emerald-100 border-emerald-300' : 'border-slate-300 bg-slate-50'
                                  }`}>
                                    {checked && <Icons.Check />}
                                  </span>
                                  <span className="text-xs">{item.label}</span>
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {/* Multi parameters numerical */}
                        <div className="grid grid-cols-3 gap-3">
                          <div>
                            <label className="block text-[9px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">Screen (H)</label>
                            <input 
                              type="number" step="0.1" min="0" max="24"
                              value={screenTime}
                              onChange={(e) => setScreenTime(parseFloat(e.target.value) || 0)}
                              className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-3 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 font-mono shadow-inner"
                              required
                            />
                          </div>
                          <div className="relative">
                            <label className="block text-[9px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">★ Target</label>
                            <input 
                              type="number" min="0" max="24"
                              value={starCount}
                              onChange={(e) => setStarCount(parseInt(e.target.value) || 0)}
                              className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-3 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 font-mono shadow-inner"
                              required
                            />
                          </div>
                          <div>
                            <label className="block text-[9px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">Work (H)</label>
                            <input 
                              type="number" step="0.5" min="0" max="24"
                              value={focusedWorkHours}
                              onChange={(e) => setFocusedWorkHours(parseFloat(e.target.value) || 0)}
                              className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-3 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 font-mono shadow-inner"
                              required
                            />
                          </div>
                        </div>

                        {/* Reflections */}
                        <div>
                          <label className="block text-[10px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">Reflections</label>
                          <textarea
                            rows="2"
                            placeholder="Optional reflections or adjustments..."
                            value={notes}
                            onChange={(e) => setNotes(e.target.value)}
                            className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 resize-none shadow-inner placeholder-slate-400"
                          />
                        </div>

                        {/* Direct Save Button (Wired completely safely without reloads) */}
                        <button
                          type="button"
                          onClick={saveRecord}
                          className="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs uppercase tracking-widest rounded-2xl transition shadow-md hover:shadow-lg duration-300"
                        >
                          {hasSavedDataForActiveDate ? "Update Entry Parameters" : "Commit Day Entry"}
                        </button>
                      </div>
                    </section>
                  </div>

                  {/* Right Side: Carry-Over Tasks Unit */}
                  <div className="lg:col-span-5 space-y-5">
                    <section className="premium-card rounded-[2.5rem] p-6 relative overflow-hidden">
                      
                      <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-4">
                        <div>
                          <h2 className="font-bold text-xs uppercase tracking-wider text-slate-850 display-font">Active Tasks Pool</h2>
                          <p className="text-[10px] text-slate-400 font-mono mt-0.5">Incomplete tasks roll forward daily</p>
                        </div>
                        <span className="text-slate-400"><Icons.Review /></span>
                      </div>

                      {/* Add task unit */}
                      <div className="flex gap-2 mb-4">
                        <input 
                          type="text"
                          placeholder="Create carry-over task..."
                          value={newTaskText}
                          onChange={(e) => setNewTaskText(e.target.value)}
                          className="flex-grow bg-[#f8fafc] border border-slate-200 rounded-xl px-4 py-2.5 text-xs text-slate-800 focus:outline-none focus:border-slate-400 shadow-inner"
                        />
                        <button
                          type="button"
                          onClick={createNewTask}
                          className="px-4.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl transition text-xs font-bold"
                        >
                          Add
                        </button>
                      </div>

                      {/* Tasks map */}
                      <div className="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                        {filteredTasksForDay.length === 0 ? (
                          <div className="text-center py-8 bg-[#f8fafc] border border-dashed border-slate-200 rounded-2xl">
                            <p className="text-[10px] font-mono text-slate-400 uppercase tracking-wider">No active tasks pending</p>
                          </div>
                        ) : (

                            <div 
                              key={task.id}

                                task.completed 
                                  ? 'bg-[#f8fafc] border-emerald-100 text-slate-400 line-through' 
                                  : 'bg-white border-slate-200 text-slate-700'
                              }`}
                            >
                              <div className="flex items-center gap-3 min-w-0 flex-grow">
                                <button
                                  type="button"
                                  onClick={() => toggleTaskStatus(task.id)}
                                  className={`w-5 h-5 rounded-lg border flex items-center justify-center shrink-0 transition-all ${
                                    task.completed 
                                      ? 'bg-emerald-100 border-emerald-300' 
                                      : 'border-slate-300 hover:border-slate-400 bg-slate-50'
                                  }`}
                                >
                                  {task.completed && <Icons.Check />}
                                </button>
                                <span className="truncate break-words text-xs">{task.text}</span>
                              </div>

                              <button
                                type="button"
                                onClick={() => deleteTaskFromPool(task.id)}
                                className="text-slate-400 hover:text-rose-500 p-1 transition"
                              >
                                <Icons.Trash />
                              </button>
                            </div>
                          ))

                      </div>
                    </section>
                  </div>

                </div>

                {/* Quick metrics row */}
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">

                  </div>

                    <span className="text-base font-bold text-slate-800 display-font">{tasks.filter(t => !t.completed).length} Tasks</span>
                  </div>
                </div>

              </div>
            )}

            {/* TAB 2: DETAILED EXECUTION HISTORY LIST */}
            {activeTab === 'history' && (
              <div className="space-y-6">
                <div className="flex justify-between items-center">
                  <div>
                    <h2 className="font-bold text-sm uppercase tracking-wider text-slate-800 display-font">Execution Timeline</h2>
                    <p className="text-[10px] text-slate-400 font-mono uppercase tracking-wider mt-0.5">Review chronological parameter values</p>
                  </div>
                </div>

                <div className="space-y-3.5">
                  {sortedHistoryLogs.length === 0 ? (

                      <p className="text-xs text-slate-400 font-mono uppercase">Timeline is currently empty</p>
                      <button 
                        onClick={() => setActiveTab('dashboard')}

                      >
                        Log First Entry
                      </button>
                    </div>
                  ) : (
                    sortedHistoryLogs.map((log) => {
                      const completedPct = Math.round((log.score / 7) * 100);
                      return (
                        <div key={log.date} className="premium-card rounded-3xl p-5 space-y-3.5">
                          <div className="flex flex-wrap items-center justify-between gap-2 border-b border-slate-100 pb-3">
                            <span className="font-bold text-xs text-slate-800 tracking-wide font-mono">{log.date}</span>
                            <div className="flex items-center gap-2">
                              <span className="text-[10px] font-mono bg-slate-50 border border-slate-200 px-2.5 py-0.5 rounded-full text-slate-600 font-medium">

                              </span>
                              <span className="text-[10px] font-mono bg-slate-50 border border-slate-200 px-2.5 py-0.5 rounded-full text-rose-500 font-medium flex items-center gap-1">
                                <Icons.Stars /> {log.starCount}
                              </span>
                            </div>
                          </div>

                          {/* Quick numerical parameters row */}
                          <div className="grid grid-cols-3 gap-2 text-[10px] font-mono text-slate-500 bg-[#f8fafc] p-3 rounded-2xl border border-slate-100">
                            <div>Screen: <span className="text-slate-800 font-semibold">{log.screenTime}h</span></div>
                            <div>Work: <span className="text-slate-800 font-semibold">{log.focusedWorkHours}h</span></div>
                            <div>Weight: <span className="text-slate-800 font-semibold">{log.weight}kg</span></div>
                          </div>

                          {/* Habit breakdown array */}
                          <div className="flex flex-wrap gap-1.5">
                            {defaultChecklistRules.map((item) => {
                              const checked = log.checkedHabits?.[item.id];
                              return (
                                <span 
                                  key={item.id} 
                                  className={`text-[8.5px] font-mono px-2.5 py-1 rounded-full ${
                                    checked ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-slate-50 text-slate-400 border border-transparent'
                                  }`}
                                >
                                  {checked ? '✓' : '✗'} {item.label.split('(')[0].trim().slice(0, 16)}...
                                </span>
                              );
                            })}
                          </div>

                          {log.notes && (
                            <p className="text-xs text-slate-455 italic bg-slate-50/50 p-3 rounded-2xl border border-slate-100 leading-relaxed">
                              "{log.notes}"
                            </p>
                          )}

                          {/* Row Actions */}
                          <div className="flex justify-end gap-2 pt-1 border-t border-slate-100/80">
                            <button
                              onClick={() => {
                                setFormDate(log.date);
                                setActiveTab('dashboard');
                              }}
                              className="px-3.5 py-1.5 bg-[#f8fafc] hover:bg-slate-100 text-slate-600 rounded-xl text-[9px] font-mono uppercase tracking-wider transition font-semibold"
                            >
                              Load Parameters
                            </button>
                            <button
                              onClick={() => {
                                if (window.confirm(`Delete logs for ${log.date}?`)) {
                                  const updated = { ...logs };
                                  delete updated[log.date];
                                  setLogs(updated);
                                  triggerToast("Record deleted");
                                }
                              }}
                              className="px-3.5 py-1.5 bg-rose-50 text-rose-600 hover:bg-rose-100/50 rounded-xl text-[9px] font-mono uppercase tracking-wider transition font-semibold"
                            >
                              Delete
                            </button>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            )}

            {/* TAB 3: AUTOMATIC WEEK COMPILER (No manual entries) */}
            {activeTab === 'review' && (
              <div className="space-y-6">
                <section className="premium-card rounded-[2.5rem] p-6 relative overflow-hidden">
                  
                  <div className="flex justify-between items-center mb-5 border-b border-slate-100 pb-4">
                    <div>
                      <h2 className="font-bold text-xs uppercase tracking-wider text-slate-850 display-font">Automatic Weekly Compile</h2>
                      <p className="text-[10px] text-slate-400 font-mono mt-0.5">Calculates preceding 7 days of logs dynamically</p>
                    </div>
                    <span className="text-slate-400"><Icons.Review /></span>
                  </div>

                  {/* Week Picker */}
                  <div className="mb-6">
                    <label className="block text-[10px] font-mono text-slate-400 uppercase tracking-wider mb-2 font-semibold">Select Target Sunday / Date</label>
                    <input 
                      type="date"
                      value={selectedReviewDate}
                      onChange={(e) => setSelectedReviewDate(e.target.value)}
                      className="w-full bg-[#f8fafc] border border-slate-200 rounded-2xl px-4 py-3 text-xs text-slate-800 focus:outline-none focus:border-slate-400 font-mono shadow-inner"
                    />
                  </div>

                  {/* Calculated metrics results cards grid */}
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                    
                    <div className="bg-[#f8fafc] border border-slate-100 p-4.5 rounded-2xl shadow-inner">
                      <span className="text-[8px] font-mono text-slate-400 uppercase block mb-1 font-semibold">AVG SCREEN TIME</span>
                      <span className="text-sm font-bold text-slate-850 display-font">{automaticWeeklyStats.avgScreen} Hrs / Day</span>
                    </div>

                    <div className="bg-[#f8fafc] border border-slate-100 p-4.5 rounded-2xl shadow-inner">
                      <span className="text-[8px] font-mono text-slate-400 uppercase block mb-1 font-semibold">TOTAL ★ TARGET</span>
                      <span className="text-sm font-bold text-rose-500 display-font">{automaticWeeklyStats.totalStar} Relapses</span>
                    </div>

                    <div className="bg-[#f8fafc] border border-slate-100 p-4.5 rounded-2xl shadow-inner col-span-2 md:col-span-1">
                      <span className="text-[8px] font-mono text-slate-400 uppercase block mb-1 font-semibold">TOTAL FOCUSED WORK</span>
                      <span className="text-sm font-bold text-emerald-600 display-font">{automaticWeeklyStats.totalWork} Hrs / Wk</span>
                    </div>

                    <div className="bg-[#f8fafc] border border-slate-100 p-4.5 rounded-2xl shadow-inner">
                      <span className="text-[8px] font-mono text-slate-400 uppercase block mb-1 font-semibold">TREND WEIGHT</span>
                      <span className="text-sm font-bold text-slate-800 display-font">{automaticWeeklyStats.weight} KG</span>
                    </div>

                    <div className="bg-[#f8fafc] border border-slate-100 p-4.5 rounded-2xl shadow-inner">
                      <span className="text-[8px] font-mono text-slate-400 uppercase block mb-1 font-semibold">AVG FOCUS</span>
                      <span className="text-sm font-bold text-indigo-600 display-font">{automaticWeeklyStats.avgWork} Hrs / Day</span>
                    </div>

                    <div className="bg-[#f8fafc] border border-slate-100 p-4.5 rounded-2xl shadow-inner col-span-2 md:col-span-1">
                      <span className="text-[8px] font-mono text-slate-400 uppercase block mb-1 font-semibold">PERFORMANCE SCORE</span>
                      <span className="text-sm font-bold text-slate-850 display-font">{automaticWeeklyStats.avgScore}%</span>
                    </div>

                  </div>

                  {/* Range information box */}
                  <div className="mt-6 bg-[#f8fafc] p-4.5 rounded-2xl border border-slate-200/50 space-y-1.5 text-xs text-slate-400">
                    <h3 className="font-bold text-slate-600 uppercase text-[10px] font-mono">Week Compilation Matrix</h3>
                    <p className="leading-relaxed text-[11px] font-mono">
                      Compiled utilizing <strong className="text-slate-700 font-bold">{automaticWeeklyStats.daysLogged} logged dates</strong> inside preceding range window from <strong className="text-slate-600">{new Date(new Date(selectedReviewDate).getTime() - 6*24*60*60*1000).toISOString().split('T')[0]}</strong> to <strong className="text-slate-600">{selectedReviewDate}</strong>.
                    </p>
                  </div>
                </section>

                {/* Data Flush options */}
                <div className="premium-card rounded-[2.5rem] p-6 space-y-3.5">
                  <div>
                    <h3 className="font-bold text-xs uppercase tracking-wider text-slate-850 display-font">Wipe Browser Storage</h3>
                    <p className="text-[10px] text-slate-400 font-mono uppercase tracking-wider mt-0.5">Reset or flush all local database entries</p>
                  </div>
                  <button
                    type="button"
                    onClick={wipeBrowserLogs}
                    className="px-4 py-2.5 bg-rose-50 hover:bg-rose-100/50 border border-rose-200 text-rose-600 text-xs font-mono uppercase tracking-wider rounded-xl transition font-semibold"
                  >
                    Clear All Browser Records
                  </button>
                </div>
              </div>
            )}

          </main>

          {/* Curved Mobile Sticky Footer Nav Bar */}
          <footer className="border-t border-slate-100 bg-white/95 py-2.5 sticky bottom-0 left-0 right-0 z-40 backdrop-blur-md">
            <div className="max-w-md mx-auto flex justify-around items-center">
              <button 
                onClick={() => setActiveTab('dashboard')}
                className={`flex flex-col items-center p-2 transition ${activeTab === 'dashboard' ? 'text-slate-850 scale-105' : 'text-slate-400'}`}
              >
                <Icons.Calendar />
                <span className="text-[9px] mt-1.5 font-mono tracking-wider uppercase font-bold">Dashboard</span>
              </button>

              <button 
                onClick={() => setActiveTab('history')}
                className={`flex flex-col items-center p-2 transition ${activeTab === 'history' ? 'text-slate-850 scale-105' : 'text-slate-400'}`}
              >
                <Icons.History />
                <span className="text-[9px] mt-1.5 font-mono tracking-wider uppercase font-bold">Timeline</span>
              </button>

              <button 
                onClick={() => setActiveTab('review')}
                className={`flex flex-col items-center p-2 transition ${activeTab === 'review' ? 'text-slate-850 scale-105' : 'text-slate-400'}`}
              >
                <Icons.Review />
                <span className="text-[9px] mt-1.5 font-mono tracking-wider uppercase font-bold">Weekly Compile</span>
              </button>
            </div>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
